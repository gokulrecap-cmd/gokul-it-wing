<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — GokulRecap</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .page-wrap { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
    .page-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .page-subtitle { color: var(--text-muted); margin-bottom: 40px; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .contact-info { display: flex; flex-direction: column; gap: 20px; }
    .contact-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px; }
    .contact-item h3 { font-size: 14px; color: var(--accent-red); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .contact-item p { color: var(--text-secondary); font-size: 14px; }
    .contact-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; display: flex; flex-direction: column; gap: 16px; }
    .contact-form h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    @media (max-width: 640px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left"><a href="index.html" style="color:var(--accent-red);font-weight:500;">← GokulRecap</a></div>
  </div>
  <div class="page-wrap">
    <h1 class="page-title">📬 Contact Us</h1>
    <p class="page-subtitle">எங்களை தொடர்பு கொள்ளுங்கள்</p>
    <div class="contact-grid">
      <div class="contact-info">
        <div class="contact-item">
          <h3>📧 மின்னஞ்சல்</h3>
          <p>news@gokulrecap.com</p>
        </div>
        <div class="contact-item">
          <h3>📍 முகவரி</h3>
          <p>GokulRecap Media<br/>மதுரை, தமிழ்நாடு — 625001</p>
        </div>
        <div class="contact-item">
          <h3>📞 தொலைபேசி</h3>
          <p>+91 98765 43210<br/>திங்கள் – வெள்ளி: 9AM – 6PM</p>
        </div>
        <div class="contact-item">
          <h3>📢 விளம்பரம்</h3>
          <p>ads@gokulrecap.com</p>
        </div>
      </div>
      <div class="contact-form">
        <h2>செய்தி அனுப்புக</h2>
        <div class="form-group">
          <label>பெயர்</label>
          <input type="text" class="form-input" placeholder="உங்கள் பெயர்" />
        </div>
        <div class="form-group">
          <label>மின்னஞ்சல்</label>
          <input type="email" class="form-input" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>செய்தி</label>
          <textarea class="form-input" rows="5" placeholder="உங்கள் செய்தியை இங்கே எழுதுங்கள்..." style="resize:vertical;"></textarea>
        </div>
        <button class="btn-primary" onclick="alert('உங்கள் செய்தி அனுப்பப்பட்டது! நன்றி.')">அனுப்பு →</button>
      </div>
    </div>
  </div>
</body>
</html>
